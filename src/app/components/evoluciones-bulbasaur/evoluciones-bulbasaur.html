<div class="container py-5">

    <div *ngIf="pokemon === 'bulbasaur'" class="row">
        <div class="col-3">
            <a routerLink="/bulbasaur/16">
                <img src="{{img}}" alt="imagen dinámica" class="img-fluid w-100">
            </a>
            <div class="d-grid gap-2 my-2">
                <a [routerLink]="['/Ivysaur']" class="btn btn-success my-5">
                    Evolucionar
                </a>
            </div>
        </div>
        <div class="col-9 d-flex align-items-center px-5">
            <h4 [innerHTML]="descripcion"></h4>
        </div>
    </div>

    <div *ngIf="pokemon === 'ivysaur'" class="row">
        <div class="col-3">
            <a routerLink="/bulbasaur/32">
                <img src="{{img}}" alt="imagen dinámica" class="img-fluid w-100">
            </a>

            <div class="d-grid gap-2 my-4">
                <a [routerLink]="['/bulbasaur']" class="btn btn-success">
                    Retroceder
                </a>
                <a [routerLink]="['/Venusaur']" class="btn btn-success">
                    Evolucionar
                </a>
            </div>
        </div>
        <div class="col-9 d-flex align-items-center px-5">
            <h4 [innerHTML]="descripcion"></h4>
        </div>
    </div>

    <div *ngIf="pokemon === 'venusaur'" class="row">
        <div class="col-3">
            <img src="{{img}}" alt="imagen dinámica" class="img-fluid w-100">
            <div class="d-grid gap-2">
                <a [routerLink]="['/Ivysaur']" class="btn btn-success my-5">
                    Retroceder
                </a>
            </div>
        </div>
        <div class="col-9 d-flex align-items-center px-5">
            <h4 [innerHTML]="descripcion"></h4>
        </div>
    </div>

    <div *ngIf="pokemon === null" class="row">
        <div class="col-12 d-flex align-items-center justify-content-center px-5">
            <h4 [innerHTML]="descripcion"></h4>
        </div>
    </div>

</div>
